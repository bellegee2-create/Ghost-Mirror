<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghost Mirror</title>
<style>
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424; --border: #2e2e2e;
    --text: #e8e8e8; --text2: #888;
    --human-bg: #1e2a1e; --human-border: #2d4a2d; --human-label: #4caf6e;
    --assistant-bg: #1a1a2e; --assistant-border: #2a2a4a; --assistant-label: #6e8caf;
    --accent: #4a7c6e;
    --font-mono: 'Cascadia Code','Fira Code','Consolas',monospace;
    --font-body: 'Segoe UI',system-ui,sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 13px; line-height: 1.6; }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 8px 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-height: 42px;
  }
  #toolbar-title { font-size: 12px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; flex: 1; min-width: 80px; }
  .tb-btn { font-size: 11px; padding: 4px 9px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); cursor: pointer; white-space: nowrap; }
  .tb-btn:hover { background: var(--bg3); color: var(--text); }
  .tb-btn.active { border-color: var(--accent); color: var(--accent); }
  #search-box { font-size: 12px; padding: 4px 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); width: 120px; }
  #search-box:focus { outline: none; border-color: var(--accent); }
  #search-box::placeholder { color: var(--text2); }
  #msg-count { font-size: 11px; color: var(--text2); white-space: nowrap; }

  #conversation { margin-top: 52px; padding: 12px 12px 120px 12px; display: flex; flex-direction: column; gap: 10px; }

  .msg { border-radius: 6px; padding: 10px 12px; border-left: 3px solid transparent; }
  .msg.human { background: var(--human-bg); border-left-color: var(--human-border); }
  .msg.assistant { background: var(--assistant-bg); border-left-color: var(--assistant-border); }
  .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .msg-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
  .msg.human .msg-label { color: var(--human-label); }
  .msg.assistant .msg-label { color: var(--assistant-label); }
  .msg-num { font-size: 10px; color: var(--text2); font-family: var(--font-mono); }
  .msg-ts { font-size: 10px; color: var(--text2); font-family: var(--font-mono); }
  .file-tag {
    font-size: 10px; padding: 2px 8px;
    background: #2a2a1a; border: 1px solid #4a4a2a; border-radius: 3px;
    color: #c8b84a; font-family: var(--font-mono);
    cursor: pointer;
  }
  .file-tag:hover { background: #3a3a2a; color: #e8d86a; }
  .msg-body { color: var(--text); white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.65; }
  .msg-body code { font-family: var(--font-mono); font-size: 11.5px; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; color: #b8d4b8; }
  .msg-body pre { background: #111; border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; margin: 6px 0; overflow-x: auto; }
  .msg-body pre code { background: none; padding: 0; font-size: 12px; color: #c8d4b8; white-space: pre; }
  .msg.filtered { display: none; }
  .msg.search-hidden { opacity: 0.2; }

  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 1px solid var(--border);
    padding: 5px 12px; font-size: 11px; color: var(--text2);
    display: flex; align-items: center; gap: 12px;
  }
  .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #555; margin-right: 5px; vertical-align: middle; }
  .status-dot.live { background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #btn-focus { margin-left: auto; font-size: 11px; padding: 2px 10px; background: #1a2a1a; border: 1px solid #2d4a2d; border-radius: 4px; color: #4caf6e; cursor: pointer; }
  #btn-focus:hover { background: #2a3a2a; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="toolbar">
  <span id="toolbar-title">&#9670; Ghost Mirror</span>
  <input type="text" id="search-box" placeholder="Search..." />
  <button class="tb-btn active" id="btn-all">All</button>
  <button class="tb-btn" id="btn-human">Human</button>
  <button class="tb-btn" id="btn-assistant">Claude</button>
  <button class="tb-btn active" id="btn-auto">&#8595; Auto</button>
  <button class="tb-btn" id="btn-top">&#8593; Top</button>
  <button class="tb-btn" id="btn-bottom">&#8595; Bottom</button>
  <span id="msg-count">0 messages</span>
</div>
<div id="conversation"></div>
<div id="status-bar">
  <span><span class="status-dot" id="status-dot"></span><span id="status-text">Waiting for Claude tab...</span></span>
  <span id="status-filter">Filter: all</span>
  <button id="btn-focus">&#8594; Go to Claude tab</button>
</div>
<script src="mirror.js"></script>
</body>
</html>
