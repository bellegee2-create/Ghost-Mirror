<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 200px;
    padding: 12px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    background: #0f0f0f;
    color: #e8e8e8;
    margin: 0;
  }
  h3 {
    font-size: 12px;
    font-weight: 600;
    color: #4a7c6e;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  button {
    width: 100%;
    padding: 8px 12px;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 4px;
    color: #e8e8e8;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    margin-bottom: 6px;
  }
  button:hover { background: #242424; border-color: #4a7c6e; }
  p {
    font-size: 11px;
    color: #666;
    line-height: 1.5;
    margin-top: 8px;
  }
</style>
</head>
<body>
<h3>&#9670; Ghost Mirror</h3>
<button onclick="openMirror()">&#x2197; Open Mirror Window</button>
<p>Opens a separate scrollable window mirroring the current Claude conversation. Drag to your second monitor.</p>
<script>
function openMirror() {
  browser.tabs.query({ active: true, currentWindow: true }).then(tabs => {
    browser.tabs.executeScript(tabs[0].id, {
      code: 'if(window.__ghostMirrorOpen) window.__ghostMirrorOpen();'
    });
    window.close();
  });
}
</script>
</body>
</html>
